<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Live Stream Overlay - Home</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-decorations">
    <div class="glow-orb orb-red"></div>
    <div class="glow-orb orb-blue"></div>
  </div>

  <div class="landing-container">
    <header class="landing-header">
      <div class="logo">
        <span class="logo-icon">🔴</span>
        <h1>Pokémon Streamer Portal</h1>
      </div>
      <p class="subtitle">Turn your YouTube live stream chat into an interactive Pokémon game overlay instantly.</p>
    </header>

    <main class="portal-card">
      <div class="tab-headers">
        <button id="tab-login" class="tab-btn active">Log In</button>
        <button id="tab-register" class="tab-btn">Register</button>
      </div>

      <div class="form-container">
        <!-- Log In Form -->
        <form id="login-form" class="portal-form">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter your username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn-submit">Launch Dashboard 🚀</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="portal-form hidden">
          <div class="form-group">
            <label for="register-username">Username</label>
            <input type="text" id="register-username" placeholder="Choose a username" required>
            <small>This will be your unique identifier. You can use your YouTube Channel ID or any name.</small>
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Create a password" required>
          </div>
          <div class="form-group">
            <label for="register-confirm-password">Confirm Password</label>
            <input type="password" id="register-confirm-password" placeholder="Re-enter your password" required>
          </div>
          <button type="submit" class="btn-submit btn-register">Create Account ✨</button>
        </form>

        <div id="portal-feedback" class="feedback-msg"></div>
      </div>
    </main>

    <footer class="landing-footer">
      <p>Need help? View the <a href="overlay.html?channel=simulator" target="_blank">Overlay Demo</a> or see how to setup.</p>
    </footer>
  </div>

  <script src="socket.io.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
