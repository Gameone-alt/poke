<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Stream Overlay</title>
  <link rel="stylesheet" href="overlay.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script>
    // Global fallback image handler for broken showdown animated sprites
    function handleImageError(img) {
      if (!img.src.includes('official-artwork')) {
        // Extract id from the url (e.g., /showdown/1.gif or similar)
        const parts = img.src.split('/');
        const file = parts[parts.length - 1];
        const id = file.split('.')[0];
        const isShiny = img.src.includes('/shiny/');
        
        if (id && !isNaN(id)) {
          console.warn(`[Overlay] Animated sprite failed for ID ${id}. Switching to static artwork.`);
          if (isShiny) {
            img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`;
          } else {
            img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="overlay-container">
    
    <!-- Game Live Feed (top right) -->
    <div id="game-feed-container">
      <div class="feed-header">LIVE GAME FEED</div>
      <div id="game-feed" class="feed-list">
        <!-- Feed entries pop up here -->
      </div>
    </div>

    <!-- Wild Pokemon Spawn Area (bottom left) -->
    <div id="wild-spawn-container" class="hidden">
      <div class="pokemon-card-wrapper">
        <div class="glow-background"></div>
        <div id="sparkle-emitter" class="sparkle-emitter"></div>
        <div class="sprite-container">
          <img id="wild-pokemon-sprite" src="" alt="Wild Pokemon" onerror="handleImageError(this)">
        </div>
        <div class="wild-pokemon-info">
          <div class="spawn-header">
            <span class="wild-tag">WILD SPAWN</span>
            <span id="wild-shiny-tag" class="shiny-tag hidden">✨ SHINY</span>
          </div>
          <span id="wild-pokemon-name" class="pokemon-name">Loading...</span>
          <div class="pokemon-types" id="wild-pokemon-types">
            <!-- Dynamic types -->
          </div>
          <div class="catch-instruction">Type <span class="cmd-text">catch</span> in chat!</div>
        </div>
      </div>
    </div>

    <!-- Catch Animation Overlay (Centered) -->
    <div id="catch-anim-overlay" class="hidden">
      <!-- We render the throw route dynamically -->
      <img id="flying-ball" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Throwing Ball" class="hidden">
      
      <div class="catch-box">
        <div class="sprite-box-catch">
          <img id="catch-target-sprite" src="" alt="Target" onerror="handleImageError(this)">
        </div>
        
        <div class="ball-land-zone">
          <img id="landing-ball" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Catching Ball" class="hidden">
          <div class="star-burst" id="star-burst"></div>
        </div>
        
        <div id="catch-status-message" class="catch-status-text">SHAKING...</div>
      </div>
    </div>

    <!-- Battle Arena Overlay (Centered) -->
    <div id="battle-overlay" class="hidden">
      <div class="battle-header-bar">
        <span class="arena-tag">BATTLE ARENA</span>
      </div>
      
      <div class="battle-field">
        <!-- Challenger Left -->
        <div id="fighter-challenger" class="fighter left-fighter">
          <div class="fighter-details">
            <div class="trainer-name" id="challenger-trainer">Challenger</div>
            <div class="fighter-poke-name" id="challenger-poke">Bulbasaur</div>
          </div>
          <div class="fighter-sprite-wrap">
            <img id="challenger-sprite" src="" alt="Challenger Pokemon" onerror="handleImageError(this)">
          </div>
        </div>

        <div class="battle-vs-badge">VS</div>

        <!-- Opponent Right -->
        <div id="fighter-opponent" class="fighter right-fighter">
          <div class="fighter-sprite-wrap">
            <img id="opponent-sprite" src="" alt="Opponent Pokemon" onerror="handleImageError(this)">
          </div>
          <div class="fighter-details">
            <div class="trainer-name" id="opponent-trainer">Opponent</div>
            <div class="fighter-poke-name" id="opponent-poke">Charmander</div>
          </div>
        </div>
      </div>
      
      <div class="impact-flash" id="impact-flash"></div>
      <div class="battle-status" id="battle-status-text">BATTLE START!</div>
    </div>

    <!-- Evolution Notification Overlay (Centered Popup) -->
    <div id="evolution-overlay" class="hidden">
      <div class="evo-backdrop"></div>
      <div class="evo-card">
        <h2 class="evo-header">EVOLUTION SUCCESS!</h2>
        <div class="evo-circle">
          <div class="evo-glow-ring"></div>
          <img id="evo-sprite" src="" alt="Evolved Sprite" onerror="handleImageError(this)">
        </div>
        <div class="evo-announcement" id="evo-desc">
          @Player's Ivysaur evolved into Venusaur!
        </div>
      </div>
    </div>

  </div>

  <!-- Chiptune Sound FX Triggers -->
  <!-- Spawn Sound -->
  <audio id="sfx-spawn" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>
  <!-- Ball Throw -->
  <audio id="sfx-throw" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-84.wav" preload="auto"></audio>
  <!-- Successful Catch -->
  <audio id="sfx-catch-success" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-84.wav" preload="auto"></audio>
  <!-- Escaped Wild Pokemon -->
  <audio id="sfx-catch-fail" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-84.wav" preload="auto"></audio>
  <!-- Physical Battle Strike -->
  <audio id="sfx-hit" src="https://assets.mixkit.co/active_storage/sfx/2759/2759-84.wav" preload="auto"></audio>
  <!-- Evolution Jingle -->
  <audio id="sfx-evolve" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-84.wav" preload="auto"></audio>

  <!-- Connect standard browser sockets and local controller -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
